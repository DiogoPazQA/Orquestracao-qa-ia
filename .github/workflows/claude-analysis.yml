name: Claude QA/IA Analysis

on:
  workflow_dispatch:

jobs:
  claude-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Claude Code executive summary and triage
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Você está atuando como um orquestrador de QA/IA.

            Gere um resumo executivo da PoC.
            Explique:
            1. O objetivo do fluxo
            2. O que é validado na PR
            3. O que é validado no pós-merge
            4. Quais são os próximos passos recomendados

            Responda em português.
            Não altere o código.
          claude_args: |
            --append-system-prompt "Siga o CLAUDE.md do repositório. Seja objetivo e executivo."
            --max-turns 6