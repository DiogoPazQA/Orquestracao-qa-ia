name: QA/IA Post-Merge Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: qa-ia-post-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-post-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run lint
        run: npm run lint

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run critical regression
        run: npm run test:regression:critical

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Publish execution summary
        if: always()
        run: |
          echo "## Resultado da Validação Pós-Merge de QA/IA" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: publicados no workflow" >> $GITHUB_STEP_SUMMARY