name: QA/IA Post-Merge Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: qa-ia-post-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-post-merge:
    name: Validate merged change on main branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      pull-requests: write
      issues: write

    env:
      NODE_VERSION: '20'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display execution context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Actor: $GITHUB_ACTOR"
          echo "Commit: $GITHUB_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run lint
        run: npm run lint

      - name: Run smoke tests
        id: smoke
        run: npm run test:smoke

      - name: Run critical regression
        id: regression
        run: npm run test:regression:critical

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Publish execution summary
        if: always()
        run: |
          echo "## Resultado da Validação Pós-Merge de QA/IA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Repositório: $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- Executor: $GITHUB_ACTOR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Etapas executadas" >> $GITHUB_STEP_SUMMARY
          echo "- Lint" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke tests" >> $GITHUB_STEP_SUMMARY
          echo "- Regressão crítica" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Evidências" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts publicados no workflow" >> $GITHUB_STEP_SUMMARY

      - name: Claude Code executive summary and triage
        if: always()
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Você está atuando como um orquestrador de QA/IA.

            Contexto da execução:
            - Repositório: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Ator: ${{ github.actor }}

            Resultado esperado:
            1. Produza um resumo executivo curto da validação pós-merge.
            2. Se houver sinais de falha, faça uma triagem inicial:
               - falha funcional
               - falha de teste
               - falha de ambiente
               - timeout
               - dependência externa
               - evidência insuficiente
            3. Sugira o próximo passo recomendado.
            4. Responda em português.
            5. Não faça alterações no código.
          claude_args: |
            --append-system-prompt "Siga o CLAUDE.md do repositório. Seja objetivo, executivo e auditável."
            --max-turns 6
            --model claude-sonnet-4-6